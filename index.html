      color: #fff;

      font-weight: bold;

      margin-top: 10px;

    .dare-box {

      align-items: center;
      justify-content: center;
      text-align: center;

      border: 1px solid rgba(139, 0, 0, 0.5);
      transition: opacity 0.5s ease;
      box-shadow: inset 0 0 15px rgba(139,0,0,0.15);
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .overlay-box {
      width: 85%;

      background: #111;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 0 25px rgba(139,0,0,0.4);
    }

      margin-bottom: 15px;
      color: #8B0000;
    }

    .overlay-box input {

      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
      background: #222;
      color: white;
    }

    .overlay-box button {
      background: #8B0000;
      color: white;
    }

    body::before {
      content: '';
      position: fixed;
      width: 300px;
      height: 300px;
      background: rgba(139,0,0,0.15);
      border-radius: 50%;
      filter: blur(90px);
      animation: pulse 5s infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.4;
      }

      50% {
        transform: scale(1.2);
        opacity: 0.8;
      }

      100% {
        transform: scale(1);

      }
    }
